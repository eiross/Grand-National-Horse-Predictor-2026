<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Horse Picker</title>

<style>
body {
  margin: 0;
  background: #000;
  color: #fff;
  text-align: center;
  font-family: Arial;
}

canvas {
  width: 95vw;
  max-width: 500px;
  display: block;
  margin: 20px auto;
}

button {
  padding: 15px 25px;
  font-size: 20px;
  background: #00c853;
  border: none;
  border-radius: 8px;
  color: white;
  cursor: pointer;
}

.horse {
  font-size: 36px;
  margin-top: 10px;
}

/* FLASH */
#flash {
  position: fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size: 12vw;
  color:#00e676;
  opacity:0;
}

/* CONFETTI */
.confetti {
  position: fixed;
  width: 10px;
  height: 10px;
  top: 0;
  animation: fall 2s linear forwards;
}

@keyframes fall {
  to {
    transform: translateY(100vh) rotate(720deg);
    opacity: 0;
  }
}
</style>
</head>

<body>

<canvas id="wheel"></canvas>
<button onclick="spin()">SPIN</button>

<div class="horse" id="result">---</div>

<div id="flash"></div>

<script>
const horses = [
"I Am Maximus","Nick Rockett","Banbridge","Grangeclare West",
"Gerri Colombe","Haiti Couleurs","Spillane's Tower","Firefox",
"Monty's Star","Spanish Harlem","Lecky Watson","Champ Kiely",
"Iroko","Favori De Champdou","Three Card Brag","Oscars Brother",
"Mr Vango","High Class Hero","Stellar Story","Beauport",
"Captain Cody","Jagwar","Perceval Legallois","Gorgeous Tom",
"The Real Whacker","Quai De Bourbon","Answer To Kayf","Jordans",
"Final Orders","Marble Sands","Panic Attack","Top Of The Bill",
"Johnnywho","Twig"
];

const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");

function resize() {
  canvas.width = canvas.clientWidth;
  canvas.height = canvas.clientWidth;
}
window.addEventListener("resize", resize);
resize();

const arc = (2*Math.PI)/horses.length;

function draw(rot) {
  const c = canvas.width/2;

  for(let i=0;i<horses.length;i++){
    const angle = i*arc + rot;

    ctx.beginPath();
    ctx.moveTo(c,c);
    ctx.arc(c,c,c,angle,angle+arc);
    ctx.fillStyle = i%2 ? "#111" : "#00c853";
    ctx.fill();

    ctx.save();
    ctx.translate(c,c);
    ctx.rotate(angle + arc/2);
    ctx.fillStyle = "#fff";
    ctx.font = (c*0.08)+"px Arial";
    ctx.fillText(horses[i], c*0.4, 5);
    ctx.restore();
  }
}

let spinning = false;

function spin() {
  if(spinning) return;
  spinning = true;

  const winner = Math.floor(Math.random()*horses.length);

  const pointer = -Math.PI/2;
  const target = pointer - (winner*arc + arc/2);

  const spins = 5;
  const final = (Math.PI*2*spins) + target;

  let start = null;

  function anim(t){
    if(!start) start = t;

    let p = (t-start)/3000;
    if(p>1) p=1;

    let ease = 1 - Math.pow(1-p,3);

    let rot = ease * final;

    ctx.clearRect(0,0,canvas.width,canvas.height);
    draw(rot);

    if(p<1){
      requestAnimationFrame(anim);
    } else {
      showResult(winner);
      spinning = false;
    }
  }

  requestAnimationFrame(anim);
}

function showResult(i){
  const name = horses[i];
  document.getElementById("result").innerText = name;

  // FLASH
  const flash = document.getElementById("flash");
  flash.innerText = name;
  flash.style.opacity = 1;

  setTimeout(()=>flash.style.opacity=0,2000);

  // CONFETTI
  for(let i=0;i<100;i++){
    let d = document.createElement("div");
    d.className="confetti";
    d.style.left=Math.random()*100+"vw";
    d.style.background=["#fff","#00e676","#ffd740"][Math.floor(Math.random()*3)];
    document.body.appendChild(d);
    setTimeout(()=>d.remove(),2000);
  }
}

draw(0);
</script>

</body>
</html>
