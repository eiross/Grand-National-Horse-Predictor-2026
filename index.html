<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Grand National Predictor</title>

<style>
body {
  margin: 0;
  background: #000;
  color: white;
  text-align: center;
  font-family: Arial;
}

.container {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

#wheel {
  width: 95vw;
  max-width: 600px;
  margin: 0 auto;
}

button {
  margin: 20px auto;
  padding: 18px;
  width: 85%;
  max-width: 350px;
  font-size: 22px;
  background: #00c853;
  border: none;
  border-radius: 10px;
  color: white;
  cursor: pointer;
}

.horse {
  font-size: 42px;
  font-weight: 900;
}

.number {
  color: #00e676;
}

#flashOverlay {
  position: fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  opacity:0;
  z-index:9999;
}

#flashText {
  font-size: 12vw;
  color:#00e676;
  font-weight:900;
}

.confetti {
  position: fixed;
  width: 10px;
  height: 10px;
  top: 0;
  animation: fall linear forwards;
}

@keyframes fall {
  to {
    transform: translateY(100vh) rotate(720deg);
    opacity: 0;
  }
}
</style>
</head>

<body>

<div class="container">
<div style="font-size:30px;">▼</div>
<canvas id="wheel"></canvas>

<button onclick="spin()">🎡 SPIN</button>

<div id="number"></div>
<div id="horse" class="horse">---</div>
</div>

<div id="flashOverlay">
  <div id="flashText"></div>
</div>

<script>
const horses = [
"1. I Am Maximus","2. Nick Rockett","3. Banbridge","4. Grangeclare West",
"5. Gerri Colombe","6. Haiti Couleurs","7. Spillane's Tower","8. Firefox",
"9. Monty's Star","10. Spanish Harlem","11. Lecky Watson","12. Champ Kiely",
"13. Iroko","14. Favori De Champdou","15. Three Card Brag","16. Oscars Brother",
"17. Mr Vango","18. High Class Hero","19. Stellar Story","20. Beauport",
"21. Captain Cody","22. Jagwar","23. Perceval Legallois","24. Gorgeous Tom",
"25. The Real Whacker","26. Quai De Bourbon","27. Answer To Kayf","28. Jordans",
"29. Final Orders","30. Marble Sands","31. Panic Attack","32. Top Of The Bill",
"33. Johnnywho","34. Twig"
];

const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");

let rotation = 0;
let spinning = false;

function resizeCanvas() {
  const size = Math.min(window.innerWidth * 0.95, 600);
  canvas.width = size;
  canvas.height = size;
}
window.addEventListener("resize", resizeCanvas);
resizeCanvas();

const arc = (2 * Math.PI) / horses.length;

function drawWheel(rot) {
  const center = canvas.width / 2;

  for (let i = 0; i < horses.length; i++) {
    const angle = i * arc + rot;

    ctx.beginPath();
    ctx.moveTo(center, center);
    ctx.arc(center, center, center, angle, angle + arc);
    ctx.fillStyle = i % 2 === 0 ? "#00c853" : "#111";
    ctx.fill();

    ctx.save();
    ctx.translate(center, center);
    ctx.rotate(angle + arc/2);
    ctx.fillStyle = "#fff";
    ctx.font = `${center * 0.08}px Arial`;
    ctx.fillText(horses[i].split(". ")[1], center * 0.45, 5);
    ctx.restore();
  }
}

function spin() {
  if (spinning) return;
  spinning = true;

  const winner = Math.floor(Math.random() * horses.length);

  const spins = 5 + Math.random() * 2;
  const pointer = -Math.PI / 2;

  const targetAngle = pointer - (winner * arc + arc / 2);

  const startRotation = rotation;
  const finalRotation = startRotation + (Math.PI * 2 * spins) + (targetAngle - (startRotation % (2*Math.PI)));

  let start = null;
  const duration = 4000;

  function animate(t) {
    if (!start) start = t;

    let progress = (t - start) / duration;
    if (progress > 1) progress = 1;

    let ease = 1 - Math.pow(1 - progress, 3);

    rotation = startRotation + ease * (finalRotation - startRotation);

    ctx.clearRect(0,0,canvas.width,canvas.height);
    drawWheel(rotation);

    if (progress < 1) {
      requestAnimationFrame(animate);
    } else {
      rotation = finalRotation % (2*Math.PI);
      finish(winner);
      spinning = false;
    }
  }

  requestAnimationFrame(animate);
}

function finish(index) {
  const result = horses[index];
  const name = result.split(". ")[1];
  const num = result.split(". ")[0];

  document.getElementById("horse").innerText = name;
  document.getElementById("number").innerText = "Runner #" + num;

  flash(name);
  confetti();
}

function flash(name) {
  const overlay = document.getElementById("flashOverlay");
  const text = document.getElementById("flashText");

  text.innerText = name;
  overlay.style.opacity = "1";

  setTimeout(()=> overlay.style.opacity="0",2000);
}

function confetti() {
  for (let i = 0; i < 120; i++) {
    let el = document.createElement("div");
    el.className = "confetti";
    el.style.left = Math.random() * 100 + "vw";
    el.style.background = ["#00e676","#fff","#ffd740","#ff5252"][Math.floor(Math.random()*4)];
    el.style.animationDuration = (Math.random()*2+1)+"s";
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),2500);
  }
}

drawWheel(rotation);
</script>

</body>
</html>
