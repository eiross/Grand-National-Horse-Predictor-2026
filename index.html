<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Grand National 2026 Predictor</title>

<style>
body {
  margin: 0;
  background: #000;
  color: white;
  text-align: center;
  font-family: Arial;
  overflow-x: hidden;
}

/* FULLSCREEN LAYOUT */
.container {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

/* FULL WIDTH WHEEL */
#wheel {
  width: 95vw;
  max-width: 600px;
  margin: 0 auto;
  display: block;
}

button {
  margin: 20px auto;
  padding: 18px;
  width: 85%;
  max-width: 360px;
  font-size: 22px;
  background: #00c853;
  border: none;
  border-radius: 10px;
  color: white;
}

.horse {
  font-size: 42px;
  font-weight: 900;
}

.number {
  color: #00e676;
}

/* 🔥 BIG FLASH */
#flashOverlay {
  position: fixed;
  top:0; left:0;
  width:100%; height:100%;
  background: rgba(0,0,0,0.95);
  display:flex;
  justify-content:center;
  align-items:center;
  opacity:0;
  z-index:9999;
}

#flashText {
  font-size: 12vw;
  max-font-size: 120px;
  color:#00e676;
  font-weight:900;
  text-align:center;
  line-height:1.1;
  transform: scale(0.6);
}

/* 🎉 BIG CONFETTI */
.confetti {
  position: fixed;
  width: 12px;
  height: 12px;
  top: 0;
  animation: fall linear forwards;
}

@keyframes fall {
  to {
    transform: translateY(100vh) rotate(720deg);
    opacity: 0;
  }
}
</style>
</head>

<body>

<div class="container">

<div style="font-size:30px;">▼</div>
<canvas id="wheel"></canvas>

<button onclick="spin()">🎡 SPIN</button>

<div id="number"></div>
<div id="horse" class="horse">---</div>

</div>

<div id="flashOverlay">
  <div id="flashText"></div>
</div>

<script>
const horses = [
"1. I Am Maximus","2. Nick Rockett","3. Banbridge","4. Grangeclare West",
"5. Gerri Colombe","6. Haiti Couleurs","7. Spillane's Tower","8. Firefox",
"9. Monty's Star","10. Spanish Harlem","11. Lecky Watson","12. Champ Kiely",
"13. Iroko","14. Favori De Champdou","15. Three Card Brag","16. Oscars Brother",
"17. Mr Vango","18. High Class Hero","19. Stellar Story","20. Beauport",
"21. Captain Cody","22. Jagwar","23. Perceval Legallois","24. Gorgeous Tom",
"25. The Real Whacker","26. Quai De Bourbon","27. Answer To Kayf","28. Jordans",
"29. Final Orders","30. Marble Sands","31. Panic Attack","32. Top Of The Bill",
"33. Johnnywho","34. Twig"
];

const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");

let rotation = 0;
let spinning = false;

function resizeCanvas() {
  const size = Math.min(window.innerWidth * 0.95, 600);
  canvas.width = size;
  canvas.height = size;
}
window.addEventListener("resize", resizeCanvas);
resizeCanvas();

const arc = (2 * Math.PI) / horses.length;

function drawWheel(rot) {
  const center = canvas.width / 2;

  for (let i = 0; i < horses.length; i++) {
    const angle = i * arc + rot;

    ctx.beginPath();
    ctx.moveTo(center, center);
    ctx.arc(center, center, center, angle, angle + arc);
    ctx.fillStyle = i % 2 === 0 ? "#00c853" : "#111";
    ctx.fill();

    ctx.save();
    ctx.translate(center, center);
    ctx.rotate(angle + arc / 2);
    ctx.fillStyle = "#fff";
    ctx.font = `${center * 0.08}px Arial`;
    ctx.fillText(horses[i].split(". ")[1], center * 0.45, 5);
    ctx.restore();
  }
}

function spin() {
  if (spinning) return;
  spinning = true;

  const winner = Math.floor(Math.random() * horses.length);

  const spins = 6 + Math.random() * 2;
  const pointer = -Math.PI / 2;

  const sliceCenter = winner * arc + arc / 2;

  const currentNormalized = rotation % (2 * Math.PI);

  const finalRotation =
    rotation +
    (Math.PI * 2 * spins) +
    (pointer - sliceCenter - currentNormalized);

  let start = null;
  const duration = 4000;
  const startRotation = rotation;

  function animate(t) {
    if (!start) start = t;

    let p = (t - start) / duration;
    if (p > 1) p = 1;

    let ease = 1 - Math.pow(1 - p, 4);

    let current =
      startRotation + ease * (finalRotation - startRotation);

    ctx.clearRect(0,0,canvas.width,canvas.height);
    drawWheel(current);

    if (p < 1) {
      requestAnimationFrame(animate);
    } else {
      rotation = finalRotation % (2*Math.PI);
      finish(winner);
      spinning = false;
    }
  }

  requestAnimationFrame(animate);
}

function finish(index) {
  const result = horses[index];
  const name = result.split(". ")[1];
  const num = result.split(". ")[0];

  document.getElementById("horse").innerText = name;
  document.getElementById("number").innerText = "Runner #" + num;

  flash(name);
  confetti();
}

function flash(name) {
  const overlay = document.getElementById("flashOverlay");
  const text = document.getElementById("flashText");

  text.innerText = name;
  overlay.style.opacity = "1";
  text.style.transform = "scale(1.2)";

  setTimeout(() => text.style.transform = "scale(1)", 200);
  setTimeout(() => overlay.style.opacity = "0", 2500);
}

function confetti() {
  for (let i = 0; i < 150; i++) {
    let el = document.createElement("div");
    el.className = "confetti";
    el.style.left = Math.random() * 100 + "vw";
    el.style.background = ["#00e676","#fff","#ffd740","#ff5252","#40c4ff"][Math.floor(Math.random()*5)];
    el.style.animationDuration = (Math.random()*2+1)+"s";
    document.body.appendChild(el);

    setTimeout(() => el.remove(), 3000);
  }
}

drawWheel(0);
</script>

</body>
</html>
